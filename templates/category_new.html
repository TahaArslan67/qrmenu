<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- CATEGORY_NAME --> - Gözde Pide</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Quicksand:400,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="menu-container">
        <div class="menu-header">Gözde Pide Menü</div>
        <div class="menu-section">
            <a href="/" class="back-button">← Kategorilere Dön</a>
            <h2 class="category-title"><!-- CATEGORY_NAME --></h2>
            <input type="text" id="item-search" class="search-input" placeholder="Ürün ara..." autocomplete="off">
            
            <div class="two-column-layout">
                <!-- Ürünler Sütunu (Sol taraf) -->
                <div class="products-column">
                    <ul class="menu-list">
                        <!-- CATEGORY_ITEMS -->
                    </ul>
                </div>
                
                <!-- Resimler Sütunu (Sağ taraf) -->
                <div class="images-column">
                    <!-- CATEGORY_IMAGES -->
                </div>
            </div>
        </div>
        <div class="menu-footer">Afiyet olsun!</div>
    </div>
    <script>
      document.getElementById('item-search').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase().trim();
        document.querySelectorAll('.menu-item-row').forEach(function(row) {
          const name = row.querySelector('.menu-item-name').textContent.toLowerCase();
          row.style.display = name.includes(term) ? '' : 'none';
        });
      });
    </script>
</body>
</html>
