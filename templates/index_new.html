<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gözde Pide - QR Menü</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Quicksand:400,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="menu-container">
        <div class="menu-header">Gözde Pide Menü</div>
        <div class="menu-section">
            <input type="text" id="category-search" class="search-input" placeholder="Kategori ara..." autocomplete="off">
            <!-- FEATURED_ITEMS -->
            <div class="category-grid">
                <!-- CATEGORIES_GRID -->
            </div>
        </div>
        <div class="menu-footer">Afiyet olsun!</div>
    </div>
    <script>
      document.getElementById('category-search').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase().trim();
        document.querySelectorAll('.category-card').forEach(function(card) {
          const name = card.querySelector('.category-name').textContent.toLowerCase();
          card.style.display = name.includes(term) ? '' : 'none';
        });
      });
    </script>
</body>
</html>
